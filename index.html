<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Consulting - Belgium</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #f8f9fa; }
        .card { text-align: center; padding: 40px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h3>Connecting to your consultant...</h3>
        <p>Please wait while we establish a secure connection.</p>
    </div>

    <script>
        // 设置 1.5 秒的自动跳转，这给了爬虫“正常页面”的错觉，但对用户来说是瞬间的
        setTimeout(function() {
            window.location.replace("https://t.me/你的用户名?text=你好，我想了解项目详情");
        }, 1500); 
    </script>
</body>
</html>
