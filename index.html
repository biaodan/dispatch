<!DOCTYPE html>
<html lang="nl"> <!-- 设置为荷兰语，匹配你的文案 -->
<head>
    <meta charset="UTF-8">
    <title>WhatsApp Verbinding</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background-color: #ffffff; }
        .card { text-align: center; padding: 30px; }
        /* WhatsApp 绿色加载圈 */
        .spinner { width: 50px; height: 50px; border: 5px solid #e1e1e1; border-top: 5px solid #25D366; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { color: #333; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <div class="text">WhatsApp wordt geopend...</div>
    </div>

    <script>
        // 同样保持 1.5 秒延迟，规避 Meta 机器人检测
        setTimeout(function() {
            window.location.replace("https://wa.me/你的电话号码?text=Ik%20wil%20graag%20meer%20weten%20over%20het%20online%20project");
        }, 1500); 
    </script>
</body>
</html>
